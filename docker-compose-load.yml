services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile # backend/Dockerfile
    deploy:
      replicas: 4
    networks:
      - app-network

  loadbalancer:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge