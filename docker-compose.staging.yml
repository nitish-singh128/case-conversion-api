services:
  backend:
    image: nitishhsinghhh/case-api:staging
    container_name: case-api-staging
    pull_policy: always
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - DOTNET_RUNNING_IN_CONTAINER=true
    restart: unless-stopped
    networks:
      - case-network
    # --- REMOVED HEALTHCHECK ENTIRELY ---

  frontend:
    image: nitishhsinghhh/case-ui:staging
    container_name: case-ui-staging
    pull_policy: always
    ports:
      - "5174:80" 
    environment:
      - VITE_API_URL=http://localhost:8081 
    depends_on:
      - backend # Back to standard dependency
    restart: unless-stopped
    networks:
      - case-network

networks:
  case-network:
    driver: bridge