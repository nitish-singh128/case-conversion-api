version: "3.9"

services:
  # ======================================================
  # BACKEND: API + Native Engine
  # ======================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: case-api
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ======================================================
  # FRONTEND: React Development Server
  # ======================================================
  frontend:
    image: node:20
    container_name: case-ui
    working_dir: /app
    volumes:
      # Updated path: from string-conversion-ui to frontend
      - ./frontend:/app
      # Prevents local node_modules from overwriting container node_modules
      - /app/node_modules
    ports:
      - "5173:5173"
    # Vite requires --host to be accessible from outside the container
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend