#                                                                    */
#  Description : Streamlined local development orchestration for the */
#                Word Case Conversion project. Triggers a local build*/
#                of the C++/API and mounts the UI for hot-reloading. */
#                                                                    */
#  Services    : 1. backend  - Built from local Dockerfile           */
#                2. frontend - Node-based dev server (Vite)          */
#                                                                    */
#  Notes       : - Backend uses 'unless-stopped' for stability.      */
#                - Frontend utilizes bind-mounts for HMR support.    */
#*********************************************************************/

version: "3.9"

services:
  # ======================================================
  # BACKEND: API + Native Engine (Build from Source)
  # ======================================================
  backend:
    # Triggers the multi-stage Dockerfile build process
    build: .
    container_name: case-api
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ======================================================
  # FRONTEND: React Development Server
  # ======================================================
  frontend:
    image: node:20
    container_name: case-ui
    working_dir: /app
    volumes:
      # Direct mount allows immediate reflection of UI code changes
      - ./string-conversion-ui:/app
    ports:
      - "5173:5173"
    # Lifecycle: Install dependencies and boot the Vite server
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend