version: "3.9"

services:
  backend:
    build: .
    container_name: case-api
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: node:20
    container_name: case-ui
    working_dir: /app
    volumes:
      - ./string-conversion-ui:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend