#                                                                    */
#  Description : Orchestrates the local development environment for  */
#                the Word Case Conversion ecosystem. Links the       */
#                .NET/C++ Backend with the React/Vite Frontend.      */
#                                                                    */
#  Services    : 1. backend  - ASP.NET Core + Native C++ Engine      */
#                2. frontend - React + TypeScript (Vite Dev Server)  */
#                                                                    */
#  Notes       : - Uses bind mounts for real-time code synchronization.*/
#                - Internal bridge networking for service isolation. */
#*********************************************************************/

version: "3.9"

services:
  # ======================================================
  # BACKEND: .NET 8 API + Native C++ Shared Library
  # ======================================================
  backend:
    container_name: case-api-dev
    build:
      context: .
      dockerfile: Dockerfile
    image: nitishhsinghhh/case-api:dev   
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      # Mount source for hot-reloading/debugging capabilities
      - ./CaseConversionAPI:/src/CaseConversionAPI
    networks:
      - case-network

  # ======================================================
  # FRONTEND: React + TypeScript (Vite)
  # ======================================================
  frontend:
    container_name: case-ui-dev
    image: node:20
    working_dir: /app
    volumes:
      # Mount UI source to enable Vite HMR (Hot Module Replacement)
      - ./string-conversion-ui:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    # Orchestration: Ensure dependencies are present before launching dev server
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - case-network

# ======================================================
# NETWORK INFRASTRUCTURE
# ======================================================
networks:
  case-network:
    driver: bridge