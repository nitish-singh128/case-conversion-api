# -----------------------------------------------------------------------------
# Microsoft Azure Container Registry / Docker Compose Template
# Project:      Hardware-Aware Case Conversion Engine
# Component:    Full-Stack Local Development Orchestration
# Documentation: https://github.com/nitishhsinghhh/case-conversion-api
# -----------------------------------------------------------------------------
# VERSION HISTORY
# Version | Date       | Author       | Description
# --------|------------|--------------|----------------------------------------
# 1.0.0   | 2026-04-21 | Nitish Singh | Initial Release. Integrated Backend/Frontend.
# -----------------------------------------------------------------------------
# ARCHITECTURAL STRATEGY:
# * Network Isolation: Services communicate over dedicated bridge 'case-network'.
# * Volume Mapping: Host-to-container mounts enable real-time hot-reloading.
# * Dependency Graph: Frontend ensures Backend availability via 'depends_on'.
# -----------------------------------------------------------------------------

services:
  # --- BACKEND: .NET 8 API + Native C++ Shared Library ---
  backend:
    container_name: case-api-dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nitishhsinghhh/case-api:dev   
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./backend:/src/backend # Mount backend source for live code updates
    networks:
      - case-network

  # --- FRONTEND: React + TypeScript (Vite) ---
  frontend:
    container_name: case-ui-dev
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Protective mount for container-side dependencies
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - case-network

# --- NETWORK INFRASTRUCTURE ---
networks:
  case-network:
    driver: bridge