#*********************************************************************/
#  CI Pipeline - Cross-Platform Native C++ Engine                     */
#                                                                     */
# Purpose   : Orchestrates a multi-OS build and test matrix for       */
#              the CaseConversionAPI C++17 core.                      */
# Trigger   : Push to main / Pull Request to main                     */
# Runtime   : Matrix Build (Ubuntu, Windows, macOS)                   */
#                                                                     */
# Notes     : - Uses platform-specific cleanup and config logic.      */
#             - Injects local app CMake configuration via copy.       */
#             - Enforces Release configuration for performance.       */
#             - Updated for Monorepo (backend/ subdirectory).         */
#                                                                     */
# Revision History:                                                   */
# ------------------------------------------------------------------  */
# Version    Date        Author          Description                  */
# ------------------------------------------------------------------  */
# 1.0        2026-04-12  Nitish Singh    Initial multi-OS workflow    */
# 1.1        2026-04-14  Nitish Singh    Refactored with Env vars     */
# 1.2        2026-04-15  Nitish Singh    Updated for /backend path    */
#*********************************************************************/

name: C++ CI CaseConversionAPI - All Platforms (Local App)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    env:
      # Updated path to reflect new backend directory
      BUILD_DIR: backend/CaseConversionAPI/CppLib/build
      CPP_ROOT: backend/CaseConversionAPI/CppLib

    steps:
      # ======================================================
      # 1. ENVIRONMENT INITIALIZATION
      # ======================================================
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler & CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja --installargs 'ADD_CMAKE_TO_PATH=System' --yes

      # ======================================================
      # 2. WORKSPACE CLEANUP & CONFIG INJECTION
      # ======================================================

      - name: Clean build directory (Non-Windows)
        if: runner.os != 'Windows'
        run: rm -rf ${{ env.BUILD_DIR }}

      - name: Clean build directory (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "$env:BUILD_DIR") {
            Remove-Item -Recurse -Force "$env:BUILD_DIR"
          }

      - name: Use local app CMakeLists
        run: cp ${{ env.CPP_ROOT }}/CMakeListsLocalApp.txt ${{ env.CPP_ROOT }}/CMakeLists.txt

      # ======================================================
      # 3. BUILD ORCHESTRATION (PLATFORM SPECIFIC)
      # ======================================================

      - name: Configure (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake -S ${{ env.CPP_ROOT }} -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S ${{ env.CPP_ROOT }} -B $env:BUILD_DIR -G "Visual Studio 17 2022" -A x64

      - name: Build project
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --parallel

      # ======================================================
      # 4. NATIVE TEST EXECUTION (CTEST)
      # ======================================================

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest -V --output-on-failure --test-dir ${{ env.BUILD_DIR }}

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        # -C Release is the key—it tells CTest to look specifically 
        # inside backend/CaseConversionAPI/CppLib/build/Release/
        run: ctest -C Release -V --output-on-failure --test-dir ${{ env.BUILD_DIR }}

      # ======================================================
      # 5. POST-EXECUTION ARTIFACTS
      # ======================================================

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: ${{ env.BUILD_DIR }}/Testing/Temporary/LastTest.log