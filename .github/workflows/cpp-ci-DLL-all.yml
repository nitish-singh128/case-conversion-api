name: C++ CI CaseConversionAPI - All Platforms

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      # -------------------------------
      # Checkout repository
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install compiler & CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja --installargs 'ADD_CMAKE_TO_PATH=System' --yes

      # -------------------------------
      # Configure project
      # -------------------------------
      - name: Configure project
        run: cmake -S CaseConversionAPI/CppLib -B CaseConversionAPI/CppLib/build -DCMAKE_BUILD_TYPE=Release

      # -------------------------------
      # Build project (all targets)
      # -------------------------------
      - name: Build project
        run: cmake --build CaseConversionAPI/CppLib/build --parallel

      # -------------------------------
      # Run main app
      # -------------------------------
      - name: Run app (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./CaseConversionAPI/CppLib/build/app

      - name: Run app (Windows)
        if: runner.os == 'Windows'
        run: |
          cd CaseConversionAPI\CppLib\build\Release
          & .\app.exe

      # -------------------------------
      # Run C++ tests
      # -------------------------------
      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --output-on-failure --test-dir CaseConversionAPI/CppLib/build

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --output-on-failure -C Release --test-dir CaseConversionAPI/CppLib/build

      # -------------------------------
      # Set library path for DLL test (Linux/macOS)
      # -------------------------------
      - name: Set library path (Linux/macOS)
        if: runner.os != 'Windows'
        run: export DYLD_LIBRARY_PATH=./CaseConversionAPI/CppLib/build:$DYLD_LIBRARY_PATH

      # -------------------------------
      # Run DLL test program
      # -------------------------------
      - name: Run DLL test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./CaseConversionAPI/CppLib/build/TestDLL

      - name: Run DLL test (Windows)
        if: runner.os == 'Windows'
        run: |
          cd CaseConversionAPI\CppLib\build\Release
          & .\TestDLL.exe

      # -------------------------------
      # Upload logs (optional)
      # -------------------------------
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: CaseConversionAPI/CppLib/build/Testing/Temporary/LastTest.log