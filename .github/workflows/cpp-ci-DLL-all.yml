name: C++ CI ProcessStringDLL - All Platforms with tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dll:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install dependencies
      - name: Install compiler & CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes

      # Clean build
      - name: Clean build folder (Linux/macOS)
        if: runner.os != 'Windows'
        run: rm -rf CaseConversionAPI/CppLib/build_dll

      - name: Clean build folder (Windows)
        if: runner.os == 'Windows'
        run: Remove-Item -Recurse -Force "CaseConversionAPI\CppLib\build_dll" -ErrorAction SilentlyContinue

      # Configure
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S CaseConversionAPI/CppLib -B CaseConversionAPI/CppLib/build_dll -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S CaseConversionAPI/CppLib -B CaseConversionAPI/CppLib/build_dll -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

      # Build
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build CaseConversionAPI/CppLib/build_dll --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build CaseConversionAPI/CppLib/build_dll --config Release --parallel

      # Run tests
      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: |
          cd CaseConversionAPI/CppLib/build_dll
          export LD_LIBRARY_PATH=$PWD
          ./ProcessStringDLLTests --gtest_output=console --gtest_brief=0

      - name: Run Tests (macOS)
        if: runner.os == 'macOS'
        run: |
          cd CaseConversionAPI/CppLib/build_dll
          export DYLD_LIBRARY_PATH=$PWD
          ./ProcessStringDLLTests --gtest_output=console --gtest_brief=0

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem -Recurse -Filter ProcessStringDLLTests.exe
          $test = Get-ChildItem -Recurse -Filter ProcessStringDLLTests.exe | Select-Object -First 1
          & $test.FullName --gtest_output=console --gtest_brief=0
      
          # Upload artifacts
      - name: Upload DLL (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ProcessStringDLL-${{ matrix.os }}
          path: CaseConversionAPI/CppLib/build_dll/lib/

      - name: Upload DLL (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ProcessStringDLL-${{ matrix.os }}
          path: CaseConversionAPI/CppLib/build_dll/Release/