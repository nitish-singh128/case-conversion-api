name: "Production Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: "Build Assets & Create Release"
    runs-on: macos-latest # Using macOS to ensure ARM64/M2 native builds
    permissions:
      contents: write
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # 1. Build Native C++ Engine
      - name: "Build Native Engine"
        run: |
          # Use your CI strategy: Configure explicitly with pathing
          cmake -S backend/CaseConversionAPI/CppLib -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      # 2. Build .NET API Artifacts
      - name: "Publish API"
        run: |
          # FIX: Specify the exact .csproj file just like a matrix build would
          dotnet publish backend/CaseConversionAPI/CaseConversionAPI.csproj -c Release -o ./publish
          
          # Use the find command with the "lib" prefix we found in your CMakeLists
          DYLIB_PATH=$(find build -name "libProcessStringDLL.dylib" | head -n 1)
          
          if [ -z "$DYLIB_PATH" ]; then
            echo "Error: libProcessStringDLL.dylib not found!"
            exit 1
          fi
          
          cp "$DYLIB_PATH" ./publish/

      # 3. Create Release Bundle (Using the same paths)
      - name: "Package Assets"
        run: |
          # Junk paths (-j) to keep the zip clean
          zip -rj WordCaseEngine-ARM64.zip ./publish
          
          # Metadata packaging
          if [ -d "backend/database" ]; then
            zip -r SourceCode-Metadata.zip backend/database README.md
          else
            zip -r SourceCode-Metadata.zip README.md
          fi

      # 4. Finalize GitHub Release
      - name: "Release to GitHub"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            WordCaseEngine-ARM64.zip
            SourceCode-Metadata.zip
          body: |
            ## Word Case Conversion Engine v1.0.0
            ### High-Performance Polyglot Architecture (M2 Optimized)
            
            This release marks the first stable version of the **Hardware-Aware String Engine**.
            
            **Release Highlights:**
            - **Native Muscle:** C++17 engine with 13 core strategies.
            - **Stress-Tested:** Validated through 250k request marathon.
            - **M2 Optimized:** Threading model pinned to P-Cores.
            
            **Installation:**
            1. Download `WordCaseEngine-ARM64.zip`.
            2. Run the SQL initialization script found in the metadata zip.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}