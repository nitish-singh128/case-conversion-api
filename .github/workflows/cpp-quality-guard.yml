#*********************************************************************/
#  CI Pipeline - C++ Static Analysis & Code Quality                  */
#                                                                    */
# Purpose   : Enforces C++17 standards, formatting, and safety.       */
# Trigger   : Push / Pull Request affecting C++ source files.         */
# Runtime   : Ubuntu Latest (Optimized for maximum speed)            */
#                                                                    */
# Notes     : - Uses Clang-Format for architectural consistency.     */
#             - Uses Clang-Tidy to detect memory leaks & code smells. */
#             - Requires CMAKE_EXPORT_COMPILE_COMMANDS for Tidy.      */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date        Author          Description                 */
# ------------------------------------------------------------------ */
# 1.0        2026-04-18  Nitish Singh    Initial Quality Guard CI   */ 
# 1.1        2026-04-18  Nitish Singh    Added CMake Swap & Fixes   */ 
# 1.2        2026-04-18  Nitish Singh    Refined src path patterns  */ 
# 1.3        2026-04-24  Nitish Singh    Standardized Header & Naming */
#*********************************************************************/

name: C++ Quality Guard

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/CaseConversionAPI/CppLib/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/CaseConversionAPI/CppLib/**'
  workflow_dispatch: {}

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Install deterministic LLVM toolchain (IMPORTANT)
      # ------------------------------------------------------------
      - name: Install Toolchain (Clang 16)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-16 clang-tidy-16 cmake

      # ------------------------------------------------------------
      # Configure project for clang-tidy
      # ------------------------------------------------------------
      - name: Configure CMake
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # ------------------------------------------------------------
      # Clang-Format Check (STRICT)
      # ------------------------------------------------------------
      - name: Run Clang-Format Check
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          find src -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.hpp" \) -print0 \
          | xargs -0 clang-format-16 --dry-run --Werror

      # ------------------------------------------------------------
      # Clang-Tidy Analysis
      # ------------------------------------------------------------
      - name: Run Clang-Tidy
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          find src -name "*.cpp" -print0 \
          | xargs -0 clang-tidy-16 -p build --header-filter=src/.* --warnings-as-errors=*