#*********************************************************************/
#  CI Pipeline - Cross-Platform Native C++ Engine                     */
#                                                                     */
# Purpose   : Validates the Core C++17 engine and CLI local app       */
#              across Linux, Windows, and macOS environments.         */
# Trigger   : Push to main / Pull Request to main                     */
# Runtime   : Matrix Build (Ubuntu, Windows, macOS)                   */
#                                                                     */
# Notes     : - Enforces ABI compatibility across OS platforms.       */
#             - Updated for the new /backend folder structure.        */
#             - Utilizes CMake for platform-agnostic build logic.     */
#                                                                     */
# Revision History:                                                   */
# ------------------------------------------------------------------  */
# Version    Date        Author          Description                  */
# ------------------------------------------------------------------  */
# 1.0        2026-04-14  Nitish Singh    Initial multi-OS workflow    */
# 1.1        2026-04-15  Nitish Singh    Updated for /backend path    */
#*********************************************************************/

name: C++ CI CaseConversionAPI - All Platforms (Local App)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      # ======================================================
      # 1. ENVIRONMENT INITIALIZATION
      # ======================================================
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler & CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja --installargs 'ADD_CMAKE_TO_PATH=System' --yes

      # ======================================================
      # 2. PRE-BUILD ORCHESTRATION (Updated Paths)
      # ======================================================

      - name: Clean build directory (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "backend/CaseConversionAPI/CppLib/build") {
            Remove-Item -Recurse -Force "backend/CaseConversionAPI/CppLib/build"
          }

      - name: Use local app CMakeLists
        run: cp backend/CaseConversionAPI/CppLib/CMakeListsLocalApp.txt backend/CaseConversionAPI/CppLib/CMakeLists.txt

      # ======================================================
      # 3. COMPILATION LAYER
      # ======================================================

      - name: Configure project
        # Using -A x64 ensures 64-bit on Windows
        run: cmake -S backend/CaseConversionAPI/CppLib -B backend/CaseConversionAPI/CppLib/build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        # CRITICAL: Added --config Release to ensure Windows builds the right version
        run: cmake --build backend/CaseConversionAPI/CppLib/build --config Release --parallel

      # ======================================================
      # 4. EXECUTION & VALIDATION (CLI APP)
      # ======================================================

      - name: Run app (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./backend/CaseConversionAPI/CppLib/build/app

      - name: Run app (Windows)
        if: runner.os == 'Windows'
        # Fixed path to point to Release folder
        run: ./backend/CaseConversionAPI/CppLib/build/Release/app.exe

      # ======================================================
      # 5. TEST SUITE (CTEST / GOOGLETEST)
      # ======================================================

      - name: Run tests with details (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --verbose --test-dir backend/CaseConversionAPI/CppLib/build

      - name: Run tests with details (Windows)
        if: runner.os == 'Windows'
        # -C Release is mandatory here so CTest knows to look in the /Release subfolder
        run: ctest -C Release --verbose --output-on-failure --test-dir backend/CaseConversionAPI/CppLib/build

      # ======================================================
      # 6. ARTIFACT & LOG GOVERNANCE
      # ======================================================

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: backend/CaseConversionAPI/CppLib/build/Testing/Temporary/LastTest.log