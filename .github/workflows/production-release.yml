#*********************************************************************/
#  CI Pipeline - Production Release (ARM64 Optimized)                */
#                                                                    */
# Purpose   : Packages high-performance binaries and metadata        */
#              for official GitHub Releases.                          */
# Trigger   : Push Version Tags (e.g., v2.0.0)                        */
# Runtime   : macOS Latest (Native Apple Silicon Compilation)         */
#                                                                    */
# Notes     : - Targets M2 Performance Cores via ARM64 build flags.   */
#             - Bundles C++ .dylib with .NET 8 Managed API.           */
#             - v2.0.0: Marks the 1M Request Endurance Milestone.     */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date        Author          Description                 */
# ------------------------------------------------------------------ */
# 1.0        2026-04-14  Nitish Singh    Initial Release Workflow    
# 1.1-1.5    2026-04-22  Nitish Singh    Monorepo & Path Optimization
# 2.0.0      2026-04-24  Nitish Singh    M2 ARM64 Production Milestone */
#*********************************************************************/

name: "Production Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: "Build Assets & Create Release"
    runs-on: macos-latest # Using macOS to ensure ARM64/M2 native builds
    permissions:
      contents: write
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # 1. Build Native C++ Engine
      - name: "Build Native Engine"
        run: |
          # Use -S and -B to point exactly to the C++ source and output
          cmake -S backend/CaseConversionAPI/CppLib -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      # 2. Build .NET API Artifacts
      - name: "Publish API"
        run: |
          # Use the verified path from your find command
          dotnet publish backend/CaseConversionAPI/DotNetAPI/DotNetAPI.csproj -c Release -o ./publish
          
          # Copy the native library into the publish folder
          # We know this exists because the previous step succeeded!
          DYLIB_PATH=$(find build -name "libProcessStringDLL.dylib" | head -n 1)
          
          if [ -z "$DYLIB_PATH" ]; then
            echo "Error: libProcessStringDLL.dylib not found!"
            exit 1
          fi
          
          cp "$DYLIB_PATH" ./publish/

      # 3. Create the Release Bundle
      - name: "Package Assets"
        run: |
          # Use -rj to junk paths so the zip root contains the files directly
          zip -rj WordCaseEngine-ARM64.zip ./publish
          
          # Pack metadata
          if [ -d "backend/database" ]; then
            zip -r SourceCode-Metadata.zip backend/database README.md
          else
            zip -r SourceCode-Metadata.zip README.md
          fi

      # 4. Finalize GitHub Release
      - name: "Release to GitHub"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            WordCaseEngine-ARM64.zip
            SourceCode-Metadata.zip
          body: |
            ## Word Case Conversion Engine v2.0.0 (Generation 2)
            ### The "Millionaire" Milestone Release
            
            This major release introduces high-availability orchestration and validates the system's industrial-grade endurance.
            
            **Major Changes:**
            - **Scale:** Integrated NGINX Layer 7 Load Balancing with a 4-replica backend strategy.
            - **Validation:** 1,000,000 request endurance test completed with 100% success rate.
            - **Performance:** Optimized thread-pinning for Apple M2 Performance Cores.
            - **Observability:** Full OpenTelemetry integration for cross-language trace propagation.
            
            **Installation:**
            1. Download `WordCaseEngine-ARM64.zip`.
            2. Run the SQL initialization script found in the metadata zip.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}