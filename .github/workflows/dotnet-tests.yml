#*********************************************************************/
#  CI Pipeline - .NET + API Integration Tests                        */
#                                                                    */
# Purpose   : Build and run all unit + integration tests             */
# Trigger   : Push / Pull Request                                    */
# Runtime   : Ubuntu latest                                          */
#*********************************************************************/

name: .NET Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build the Native C++ Library first
      - name: Build C++ Library
        working-directory: CaseConversionAPI/CppLib
        run: |
            mkdir -p build
            cd build
            cmake ..
            cmake --build . --config Release

      # 2. Setup .NET Environment
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 3. Restore and Build the Test Project
      - name: Build .NET Tests
        working-directory: CaseConversionAPI/tests/DotNetTests
        run: |
            dotnet restore
            dotnet build --configuration Release

      # 4. CRITICAL: Inject Native Artifact into Test Execution Context
      # This ensures the P/Invoke layer can resolve the .so library
      - name: Inject Native Library to Test Folder
        run: |
            # Find the compiled .so file
            LIB_PATH=$(find CaseConversionAPI/CppLib/build -name "libProcessStringDLL.so")
            
            # Destination: The bin folder where the test dll lives
            DEST_PATH="CaseConversionAPI/tests/DotNetTests/bin/Release/net8.0/"
            
            echo "Moving $LIB_PATH to $DEST_PATH"
            cp $LIB_PATH $DEST_PATH
            
            # Also copy to the test project root as a fallback for the runner
            cp $LIB_PATH CaseConversionAPI/tests/DotNetTests/

      # 5. Execute Tests
      - name: Run Integration Tests
        working-directory: CaseConversionAPI/tests/DotNetTests
        run: dotnet test --no-build --configuration Release --verbosity normal