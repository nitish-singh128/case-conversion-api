#*********************************************************************/
#  CI Pipeline - .NET + API Integration Tests                       */
#                                                                     */
# Purpose   : Orchestrates the compilation of native C++ assets and   */
#              executes the .NET integration test suite.              */
# Trigger   : Push to main/develop | Pull Request to main             */
# Runtime   : Ubuntu Latest                                           */
#                                                                     */
# Notes     : - Manages the critical injection of .so artifacts into  */
#               the .NET bin directory for P/Invoke resolution.       */
#             - Updated for Monorepo (backend/ subdirectory).         */
#                                                                     */
# Revision History:                                                   */
# ------------------------------------------------------------------  */
# Version    Date        Author          Description                  */
# ------------------------------------------------------------------  */
# 1.0        2026-04-14  Nitish Singh    Initial .NET Integration CI  */
# 1.1        2026-04-15  Nitish Singh    Updated for /backend path    */
#*********************************************************************/

name: .NET Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ======================================================
      # 1. REPOSITORY & NATIVE TOOLCHAIN
      # ======================================================

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build C++ Library
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
            mkdir -p build
            cd build
            cmake ..
            cmake --build . --config Release

      # ======================================================
      # 2. MANAGED ENVIRONMENT SETUP
      # ======================================================

      - name: Setup .NET Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build .NET Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        run: |
            dotnet restore
            dotnet build --configuration Release

      # ======================================================
      # 3. ARTIFACT INJECTION (P/INVOKE PREPARATION)
      # ======================================================

      - name: Inject Native Library to Test Folder
        run: |
            # Locate the native binary
            LIB_PATH=$(find backend/CaseConversionAPI/CppLib/build -name "libProcessStringDLL.so")
            
            # Destination path within the .NET build output
            DEST_PATH="backend/CaseConversionAPI/tests/DotNetTests/bin/Release/net8.0/"
            
            echo "[INFO] Injecting $LIB_PATH into $DEST_PATH"
            cp $LIB_PATH $DEST_PATH
            
            # Secondary copy for runner root fallback
            cp $LIB_PATH backend/CaseConversionAPI/tests/DotNetTests/

      # ======================================================
      # 4. TEST EXECUTION (INTEGRATION LAYER)
      # ======================================================

      - name: Run Integration Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        run: dotnet test --no-build --configuration Release --verbosity normal