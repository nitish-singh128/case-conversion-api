#*********************************************************************/
#  CI Pipeline - .NET + API Integration Tests (Multi-Platform)       */
#                                                                    */
# Purpose   : Validates the P/Invoke bridge and API logic across     */
#              Ubuntu, macOS, and Windows environments.              */
# Trigger   : Push to main/develop | Pull Request to main            */
# Runtime   : Matrix (Ubuntu, macOS, Windows)                        */
#                                                                    */
# Notes     : - Synchronizes Native & Managed build cycles.          */
#             - Implements cross-platform artifact injection.        */
#             - Fixes Windows C2491 via PROCESSSTRING_EXPORTS.       */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date        Author           Description                */
# ------------------------------------------------------------------ */
# 1.0        2026-04-14  Nitish Singh     Initial .NET Integration CI*/
# 1.1        2026-04-15  Nitish Singh     Updated for /backend path  */
# 1.2        2026-04-16  Nitish Singh     Multi-Platform Matrix Fix  */
#*********************************************************************/

name: .NET Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # ======================================================
      # 1. REPOSITORY & TOOLCHAIN SETUP
      # ======================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ======================================================
      # 2. NATIVE LAYER BUILD (C++17)
      # ======================================================
      - name: Build C++ Library (Unix)
        if: runner.os != 'Windows'
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release --parallel

      - name: Build C++ Library (Windows)
        if: runner.os == 'Windows'
        working-directory: backend/CaseConversionAPI/CppLib
        # -DPROCESSSTRING_EXPORTS is critical to resolve Error C2491 on MSVC
        run: |
            cmake -S . -B build `
                  -DCMAKE_BUILD_TYPE=Release `
                  -DPROCESSSTRING_EXPORTS=ON `
                  -D_CRT_SECURE_NO_WARNINGS=ON `
                  -G "Visual Studio 17 2022" -A x64
            cmake --build build --config Release --parallel

      # ======================================================
      # 3. MANAGED LAYER BUILD (.NET 8)
      # ======================================================
      - name: Build .NET Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        run: |
            dotnet restore
            dotnet build --configuration Release

      # ======================================================
      # 4. ARTIFACT INJECTION (ABI BRIDGE PREP)
      # ======================================================
      - name: Inject Native Library to Test Folder
        shell: bash
        run: |
            # Set target path within the .NET build output
            DEST_PATH="backend/CaseConversionAPI/tests/DotNetTests/bin/Release/net8.0/"
            mkdir -p "$DEST_PATH"

            # Locate the library file based on platform and the 'lib' prefix observed in logs
            if [ "${{ runner.os }}" == "Linux" ]; then
              LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "libProcessStringDLL.so" | head -n 1)
            elif [ "${{ runner.os }}" == "macOS" ]; then
              LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "libProcessStringDLL.dylib" | head -n 1)
            elif [ "${{ runner.os }}" == "Windows" ]; then
              # Logs show Windows is producing 'libProcessStringDLL.dll'
              LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "libProcessStringDLL.dll" | head -n 1)
            fi

            if [ -z "$LIB_FILE" ]; then
              echo "[ERROR] Native library not found for ${{ runner.os }}"
              # Final debug fallback to see the exact filename if it still fails
              find backend/CaseConversionAPI/CppLib/build -name "*.dll" -o -name "*.so" -o -name "*.dylib"
              exit 1
            fi

            echo "[INFO] Found library at: $LIB_FILE"
            cp "$LIB_FILE" "$DEST_PATH"
            
            # Ensure the .NET project directory also has a copy for local runner resolution
            cp "$LIB_FILE" "backend/CaseConversionAPI/tests/DotNetTests/"

      # ======================================================
      # 5. TEST EXECUTION (INTEGRATION SUITE)
      # ======================================================
      - name: Run Integration Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        run: dotnet test --no-build --configuration Release --verbosity normal