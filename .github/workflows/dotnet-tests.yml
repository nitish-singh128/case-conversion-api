#*********************************************************************/
#  CI Pipeline - .NET + API Integration Tests (Multi-Platform)       */
#                                                                    */
# Purpose   : Validates the P/Invoke bridge and API logic across      */
#              Ubuntu, macOS, and Windows environments.               */
# Trigger   : Push to main/develop | Pull Request to main            */
# Runtime   : Matrix (Ubuntu, macOS, Windows)                        */
#                                                                    */
# Notes     : - Synchronizes Native & Managed build cycles.          */
#             - Implements cross-platform artifact injection.        */
#             - v1.4: Injects Jaeger sidecar for Telemetry validation.*/
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date        Author          Description                 */
# ------------------------------------------------------------------ */
# 1.0-1.2    2026-04-17  Nitish Singh    Initial Setup & Matrix Fixes
# 1.3        2026-04-18  Nitish Singh    Added Telemetry Validation  
# 1.4        2026-04-24  Nitish Singh    Standardized Header & Env   */
#*********************************************************************/

name: .NET Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    # Sidecar for Linux to verify actual trace ingestion
    services:
      jaeger:
        image: ${{ matrix.os == 'ubuntu-latest' && 'jaegertracing/all-in-one:latest' || '' }}
        env:
          COLLECTOR_OTLP_ENABLED: true
        ports:
          - 4317:4317

    steps:
      # ======================================================
      # 1. REPOSITORY & TOOLCHAIN SETUP
      # ======================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ======================================================
      # 2. NATIVE LAYER BUILD (C++17)
      # ======================================================
      - name: Build C++ Library (Unix)
        if: runner.os != 'Windows'
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release --parallel

      - name: Build C++ Library (Windows)
        if: runner.os == 'Windows'
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
            cmake -S . -B build `
                  -DCMAKE_BUILD_TYPE=Release `
                  -DPROCESSSTRING_EXPORTS=ON `
                  -D_CRT_SECURE_NO_WARNINGS=ON `
                  -G "Visual Studio 17 2022" -A x64
            cmake --build build --config Release --parallel

      # ======================================================
      # 3. MANAGED LAYER BUILD & TELEMETRY RESTORE
      # ======================================================
      - name: Build .NET Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        run: |
            dotnet restore
            dotnet build --configuration Release

      # ======================================================
      # 4. ARTIFACT INJECTION (ABI BRIDGE PREP)
      # ======================================================
      - name: Inject Native Library to Test Folder
        shell: bash
        run: |
            DEST_PATH="backend/CaseConversionAPI/tests/DotNetTests/bin/Release/net8.0/"
            mkdir -p "$DEST_PATH"

            if [ "${{ runner.os }}" == "Windows" ]; then
              LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "*.dll" | head -n 1)
              TARGET_NAME="ProcessStringDLL.dll"
            elif [ "${{ runner.os }}" == "macOS" ]; then
              LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "*.dylib" | head -n 1)
              TARGET_NAME="libProcessStringDLL.dylib"
            else
              LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "*.so" | head -n 1)
              TARGET_NAME="libProcessStringDLL.so"
            fi

            cp "$LIB_FILE" "$DEST_PATH$TARGET_NAME"
            cp "$LIB_FILE" "backend/CaseConversionAPI/tests/DotNetTests/$TARGET_NAME"

      # ======================================================
      # 5. TEST EXECUTION (WITH TELEMETRY CONTEXT)
      # ======================================================
      - name: Run Integration Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        env:
          # Point to local Jaeger on Ubuntu, or use a dummy endpoint on others
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ runner.os == 'Linux' && 'http://localhost:4317' || 'http://localhost:9999' }}
          OTEL_SERVICE_NAME: "CaseConversion-Test-Runner"
        run: dotnet test --no-build --configuration Release --verbosity normal