#*********************************************************************/
#  CI Pipeline - Frontend Quality Assurance (Vite + React)           */
#                                                                    */
# Purpose   : Validates the React/TypeScript frontend ecosystem.      */
# Trigger   : Push / Pull Request affecting the /frontend directory. */
# Runtime   : Ubuntu Latest (Single Platform for Speed)              */
#                                                                    */
# Notes     : - Enforces strict TypeScript type-checking.            */
#             - Runs ESLint to maintain architectural style guides.  */
#             - Executes Vite/Vitest suite for UI component logic.   */
#*********************************************************************/

name: Frontend CI - UI Quality

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'frontend/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'frontend/**'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ======================================================
      # 1. STATIC ANALYSIS (Linting & Formatting)
      # ======================================================
      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      # ======================================================
      # 2. TYPE INTEGRITY (TypeScript)
      # ======================================================
      - name: Type Check (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      # ======================================================
      # 3. UNIT & COMPONENT TESTS (Vitest/Jest)
      # ======================================================
      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test -- --run

      # ======================================================
      # 4. PRODUCTION BUILD SMOKE TEST
      # ======================================================
      - name: Verify Production Build
        working-directory: frontend
        run: npm run build