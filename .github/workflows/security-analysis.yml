#*********************************************************************/
#  Security Pipeline - CodeQL Advanced Semantic Analysis             */
#                                                                    */
# Purpose   : Performs SAST (Static Application Security Testing)     */
#              across the polyglot stack (C++, C#, TS, Actions).      */
# Trigger   : Weekly Schedule / Push & PR to main                    */
# Runtime   : Matrix Build (Multi-language Analysis)                 */
#                                                                    */
# Notes     : - Manual build mode enabled for C++ to handle nested   */
#               monorepo structure in /backend.                      */
#             - Identifies memory safety issues in Native C++ code.  */
#             - Validates P/Invoke security in the .NET layer.       */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date        Author          Description                 */
# ------------------------------------------------------------------ */
# 1.0        2026-04-18  Nitish Singh    Initial Security Orchestration
# 1.1        2026-04-18  Nitish Singh    Fix: Manual Build for C++ Lib
# 1.2        2026-04-24  Nitish Singh    Finalized Naming & Header    */
#*********************************************************************/


name: "Security Audit"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 23 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual  # Switched to manual to handle nested pathing
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      # ======================================================
      # 1. ENVIRONMENT INITIALIZATION
      # ======================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler & CMake (Linux)
        if: matrix.language == 'c-cpp'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      # ======================================================
      # 2. CODEQL INITIALIZATION
      # ======================================================
      - name: Initialize CodeQL Engine
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      # ======================================================
      # 3. COMPILATION LAYER (Manual Pathing)
      # ======================================================
      - name: Run Manual Build (C++ Native Engine)
        if: matrix.build-mode == 'manual' && matrix.language == 'c-cpp'
        shell: bash
        run: |
          echo "Building C++ Engine for Semantic Analysis..."
          # Match the path from your successful C++ CI workflow
          cd backend/CaseConversionAPI/CppLib
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      # ======================================================
      # 4. SEMANTIC ANALYSIS & SARIF GENERATION
      # ======================================================
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"