#*********************************************************************/
#  CI Pipeline - macOS Native Bridge & REST Integration              */
#                                                                     */
# Purpose   : Validates the end-to-end integration between the        */
#              C++ Native Engine (dylib) and the .NET 8 REST API      */
#              specifically on macOS runners.                         */
# Trigger   : Push to main / Pull Request to main                     */
# Runtime   : macOS Latest                                           */
#                                                                     */
# Notes     : - Verifies P/Invoke symbol resolution for .dylib files.*/
#             - Executes a live 'Smoke Test' using background         */
#               process orchestration and Curl.                       */
#             - Updated for Monorepo (backend/ subdirectory).         */
#                                                                     */
# Revision History:                                                   */
# ------------------------------------------------------------------  */
# Version    Date        Author          Description                  */
# ------------------------------------------------------------------  */
# 1.0        2026-04-14  Nitish Singh    Initial macOS integration    */
# 1.1        2026-04-15  Nitish Singh    Updated for /backend path    */
#*********************************************************************/

name: C++ DLL + .NET REST API CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    # ======================================================
    # 1. ENVIRONMENT & TOOLCHAIN SETUP
    # ======================================================

    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------------
    # Build C++ shared library
    # -------------------------------
    - name: Install CMake
      run: brew install cmake

    # ======================================================
    # 2. NATIVE LAYER: C++ DYNAMIC LIBRARY (.dylib)
    # ======================================================

    - name: Build C++ DLL
      run: |
        cd backend/CaseConversionAPI/CppLib
        mkdir -p build
        cd build
        cmake ..
        make

    - name: Verify dylib
      run: |
        ls -l backend/CaseConversionAPI/CppLib/build/lib

    # ======================================================
    # 3. MANAGED LAYER: .NET 8 REST API
    # ======================================================

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # -------------------------------
    # Build REST API (csproj copies dylib)
    # -------------------------------
    - name: Restore .NET
      run: dotnet restore backend/CaseConversionAPI/DotNetAPI

    - name: Build .NET
      run: dotnet build backend/CaseConversionAPI/DotNetAPI --no-restore

    # ======================================================
    # 4. SERVICE ORCHESTRATION & VALIDATION
    # ======================================================

    - name: Run API
      run: |
        cd backend/CaseConversionAPI/DotNetAPI
        dotnet run &
        sleep 15

    # -------------------------------
    # Test endpoint
    # -------------------------------
    - name: Test REST endpoint
      run: |
        curl "http://localhost:5000/api/WordCase/convert?input=Hello%20World&choice=1"