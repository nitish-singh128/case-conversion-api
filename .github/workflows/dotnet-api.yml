#*********************************************************************/
#  CI Pipeline - .NET + API Integration Tests (Multi-Platform)       */
#                                                                    */
# Purpose   : Validates the P/Invoke bridge and API logic across     */
#              Ubuntu, macOS, and Windows environments.              */
# Trigger   : Push to main/develop | Pull Request to main            */
# Runtime   : Matrix (Ubuntu, macOS, Windows)                        */
#                                                                    */
# Notes     : - Synchronizes Native & Managed build cycles.          */
#             - Implements cross-platform artifact injection.        */
#             - Fixes Windows C2491 via PROCESSSTRING_EXPORTS.       */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date        Author           Description                */
# ------------------------------------------------------------------ */
# 1.0        2026-04-14  Nitish Singh     Initial .NET Integration CI*/
# 1.1        2026-04-15  Nitish Singh     Updated for /backend path  */
# 1.2        2026-04-17  Nitish Singh     Multi-Platform Matrix Fix  */
#*********************************************************************/

name: .NET Tests Multi-Platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # ======================================================
      # 1. ENVIRONMENT SETUP
      # ======================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ======================================================
      # 2. NATIVE LAYER BUILD (C++17)
      # ======================================================
      - name: Build C++ Library (Unix)
        if: runner.os != 'Windows'
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      - name: Build C++ Library (Windows)
        if: runner.os == 'Windows'
        working-directory: backend/CaseConversionAPI/CppLib
        # Using ` symbols for line breaks in PowerShell
        run: |
          cmake -S . -B build `
                -DCMAKE_BUILD_TYPE=Release `
                -DPROCESSSTRING_EXPORTS=ON `
                -D_CRT_SECURE_NO_WARNINGS=ON `
                -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release --parallel

      # ======================================================
      # 3. MANAGED LAYER BUILD (.NET 8)
      # ======================================================
      - name: Build .NET Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        run: |
          dotnet restore
          dotnet build --configuration Release

      # ======================================================
      # 4. ARTIFACT INJECTION (ABI BRIDGE PREP)
      # ======================================================
      - name: Inject Native Library to Test Folder
        shell: bash
        run: |
          # Define target directory for the compiled .NET binaries
          DEST_PATH="backend/CaseConversionAPI/tests/DotNetTests/bin/Release/net8.0/"
          mkdir -p "$DEST_PATH"

          # Locate and rename the binary based on the OS
          if [ "${{ runner.os }}" == "Windows" ]; then
            LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "*.dll" | head -n 1)
            TARGET_NAME="ProcessStringDLL.dll"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "*.dylib" | head -n 1)
            TARGET_NAME="libProcessStringDLL.dylib"
          else
            LIB_FILE=$(find backend/CaseConversionAPI/CppLib/build -name "*.so" | head -n 1)
            TARGET_NAME="libProcessStringDLL.so"
          fi

          echo "Injecting $LIB_FILE -> $DEST_PATH$TARGET_NAME"
          cp "$LIB_FILE" "$DEST_PATH$TARGET_NAME"
          
          # Also place in working directory for local execution context
          cp "$LIB_FILE" "backend/CaseConversionAPI/tests/DotNetTests/$TARGET_NAME"

      # ======================================================
      # 5. TEST EXECUTION
      # ======================================================
      - name: Run Integration Tests
        working-directory: backend/CaseConversionAPI/tests/DotNetTests
        # Adding current directory to PATH on Windows to ensure P/Invoke finds the DLL
        run: |
          ${{ runner.os == 'Windows' && '$env:PATH += ";."' || '' }}
          dotnet test --no-build --configuration Release --verbosity normal