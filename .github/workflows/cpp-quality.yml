#*********************************************************************/
#  CI Pipeline - C++ Static Analysis & Code Quality                  */
#                                                                    */
# Purpose   : Enforces C++17 standards, formatting, and safety.       */
# Trigger   : Push / Pull Request affecting C++ source files.        */
# Runtime   : Ubuntu Latest (Single Platform for maximum speed)      */
#                                                                    */
# Notes     : - Uses Clang-Format for architectural consistency.     */
#             - Uses Clang-Tidy to detect memory leaks & code smells. */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date         Author           Description               */
# ------------------------------------------------------------------ */
# 1.0        2026-04-18   Nitish Singh     Initial Quality Guard CI  */
# 1.1        2026-04-18   Nitish Singh     Added CMake Swap & Fixes  */
#*********************************************************************/

name: C++ Quality Guard

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/CaseConversionAPI/CppLib/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/CaseConversionAPI/CppLib/**'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format cmake

      # ======================================================
      # 1. PREPARATION (The "Swap Trick")
      # ======================================================
      - name: Use local app CMakeLists
        working-directory: backend/CaseConversionAPI/CppLib
        run: cp CMakeListsLocalApp.txt CMakeLists.txt

      # ======================================================
      # 2. FORMATTING CHECK
      # ======================================================
      - name: Run Clang-Format Check
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          # Finds all C++ files and checks formatting style
          # --Werror forces a failure if code is messy
          find . -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

      # ======================================================
      # 3. STATIC ANALYSIS (The "Linter")
      # ======================================================
      - name: Configure CMake for Clang-Tidy
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          # Generate compile_commands.json so Clang-Tidy knows include paths
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run Clang-Tidy
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          # Scans for logic errors and memory leaks
          # Using find ensures we check all files in the directory tree
          find . -name "*.cpp" | xargs clang-tidy -p build --header-filter=.* --warnings-as-errors=*