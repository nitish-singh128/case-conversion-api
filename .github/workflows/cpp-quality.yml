#*********************************************************************/
#  CI Pipeline - C++ Static Analysis & Code Quality                  */
#                                                                    */
# Purpose   : Enforces C++17 standards, formatting, and safety.       */
# Trigger   : Push / Pull Request affecting C++ source files.        */
# Runtime   : Ubuntu Latest (Single Platform for maximum speed)      */
#                                                                    */
# Notes     : - Uses Clang-Format for architectural consistency.     */
#             - Uses Clang-Tidy to detect memory leaks & code smells. */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date         Author           Description               */
# ------------------------------------------------------------------ */
# 1.0        2026-04-18   Nitish Singh     Initial Quality Guard CI  */
# 1.1        2026-04-18   Nitish Singh     Added CMake Swap & Fixes  */
# 1.2        2026-04-18   Nitish Singh     Refined src path patterns */
#*********************************************************************/

name: C++ Quality Guard

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'backend/CaseConversionAPI/CppLib/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/CaseConversionAPI/CppLib/**'
  # Allows manual triggering for testing
  workflow_dispatch: {}

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format cmake

      - name: Configure CMake
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          # Generates compile_commands.json needed by Clang-Tidy
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run Clang-Format Check
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          # Checks both .cpp and .h files inside the src folder
          find src -type f \( -name "*.cpp" -o -name "*.h" \) | xargs clang-format --dry-run --Werror

      - name: Run Clang-Tidy
        working-directory: backend/CaseConversionAPI/CppLib
        run: |
          # Scans the .cpp files using the header info from the same folder
          find src -name "*.cpp" | xargs clang-tidy -p build --header-filter=src/.* --warnings-as-errors=*