#*********************************************************************/
#  CI Pipeline - Telemetry E2E Integration & Verification             */
#                                                                    */
# Purpose   : Orchestrates a full-stack smoke test by building the   */
#             C++ engine, running the .NET API, and verifying        */
#             trace ingestion into a live Jaeger instance.           */
# Trigger   : Push to main / Pull Request to main                    */
# Runtime   : Ubuntu Latest (GitHub Hosted)                          */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date          Author           Description              */
# ------------------------------------------------------------------ */
# 1.0        2026-04-18    Nitish Singh     Initial E2E Telemetry CI */
#*********************************************************************/

name: Telemetry E2E Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  telemetry-test:
    name: "Build, Instrument, and Verify"
    runs-on: ubuntu-latest

    # Sidecar Services: Jaeger OTLP collector
    services:
      jaeger:
        image: jaegertracing/all-in-one:latest
        env:
          COLLECTOR_OTLP_ENABLED: true
        ports:
          - 16686:16686
          - 4317:4317

    steps:
      # --- 1. Environment Setup ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      # --- 2. Build Native Layer ---
      - name: Compile C++ Conversion Engine
        run: |
          mkdir -p backend/CaseConversionAPI/CppLib/build
          cd backend/CaseConversionAPI/CppLib/build
          cmake ..
          make

      # --- 3. Build & Launch Managed Gateway ---
      - name: Bootstrap .NET API
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
          ASPNETCORE_URLS: http://localhost:5000
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          cd backend/CaseConversionAPI/DotNetAPI
          dotnet restore
          dotnet build -c Release
          
          # Create the directory if it doesn't exist and copy the DLL there
          mkdir -p ./bin/Release/net8.0/
          cp ../CppLib/build/libProcessStringDLL.so ./bin/Release/net8.0/
          
          # Also copy to the root just in case
          cp ../CppLib/build/libProcessStringDLL.so .
          
          # Launch in background
          dotnet run -c Release --no-build > api.log 2>&1 & 
          
          echo "Waiting for API to respond..."
          timeout 30s bash -c 'until curl -s http://localhost:5000/api/WordCase/convert -X POST -d "{\"text\":\"\"}" > /dev/null; do sleep 1; done'

      # --- 4. Traffic Injection ---
      - name: Trigger Distributed Trace
        run: |
          # Send multiple probes to ensure ingestion
          for i in {1..3}; do
            curl -v -X POST http://localhost:5000/api/WordCase/convert \
            -H "Content-Type: application/json" \
            -d '{"text": "E2E-PROBE-'$i'", "choice": 1}'
            sleep 1
          done

      # --- 5. Telemetry Validation ---
      - name: Verify Span Ingestion in Jaeger
        run: |
          echo "Stopping API gracefully to flush spans..."
          pkill -15 dotnet || true
          sleep 5

          echo "Checking Jaeger for Native-C++-Process span..."
          for i in {1..10}; do
            RESPONSE=$(curl -s "http://localhost:16686/api/traces?service=CaseConversion-Gateway")
            
            if [[ "$RESPONSE" == *"Native-C++-Process"* ]]; then
              echo "SUCCESS: Found the native bridge span!"
              exit 0
            fi
            
            echo "Attempt $i: Span not found. Services indexed: $(curl -s http://localhost:16686/api/services)"
            sleep 5
          done
          
          echo "ERROR: Trace never arrived. API Logs:"
          cat backend/CaseConversionAPI/DotNetAPI/api.log
          exit 1