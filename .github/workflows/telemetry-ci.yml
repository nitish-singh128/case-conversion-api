#*********************************************************************/
#  CI Pipeline - Telemetry E2E Integration & Verification             */
#                                                                    */
# Purpose   : Orchestrates a full-stack smoke test by building the   */
#             C++ engine, running the .NET API, and verifying        */
#             trace ingestion into a live Jaeger instance.           */
# Trigger   : Push to main / Pull Request to main                    */
# Runtime   : Ubuntu Latest (GitHub Hosted)                          */
#                                                                    */
# Revision History:                                                  */
# ------------------------------------------------------------------ */
# Version    Date          Author           Description              */
# ------------------------------------------------------------------ */
# 1.0        2026-04-18    Nitish Singh     Initial E2E Telemetry CI */
#*********************************************************************/

name: Telemetry E2E Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  telemetry-test:
    name: "Build, Instrument, and Verify"
    runs-on: ubuntu-latest

    # Sidecar Services: Run Jaeger in the background for OTLP collection
    services:
      jaeger:
        image: jaegertracing/all-in-one:latest
        env:
          COLLECTOR_OTLP_ENABLED: true
        ports:
          - 16686:16686
          - 4317:4317

    steps:
      # --- 1. Environment Setup ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      # --- 2. Build Native Layer ---
      - name: Compile C++ Conversion Engine
        run: |
          mkdir -p backend/CaseConversionAPI/CppLib/build
          cd backend/CaseConversionAPI/CppLib/build
          cmake ..
          make

      # --- 3. Build & Launch Managed Gateway ---
      - name: Bootstrap .NET API with Native Interop
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
          ASPNETCORE_URLS: http://localhost:5000
        run: |
          cd backend/CaseConversionAPI/DotNetAPI
          
          # Ensure dependencies are restored and built
          dotnet restore
          dotnet build -c Release
          
          # Sync Linux-compatible .so for P/Invoke resolution
          cp ../CppLib/build/libProcessStringDLL.so .
          
          # Launch API in background
          dotnet run -c Release --no-build & 
          
          # Wait-for-Ready: Check if port 5000 is responding
          echo "Waiting for API to respond on port 5000..."
          for i in {1..20}; do
            if curl -s http://localhost:5000/health > /dev/null || [ $? -eq 7 ]; then
              # Port is at least rejecting/accepting, checking if it's up
              if curl -s http://localhost:5000/api/WordCase/convert -X POST -d '{"text":""}' > /dev/null; then
                echo "API is UP!"
                break
              fi
            fi
            echo "Still waiting..."
            sleep 2
          done

      # --- 4. Traffic Injection ---
      - name: Trigger Distributed Trace
        run: |
          # Use -v to see exactly what is happening if it fails
          curl -v -X POST http://localhost:5000/api/WordCase/convert \
          -H "Content-Type: application/json" \
          -d '{"text": "E2E-TELEMETRY-PROBE", "choice": 1}'

     # --- 5. Telemetry Validation ---
      - name: Verify Span Ingestion in Jaeger
        run: |
          echo "Stopping API gracefully..."
          pkill -15 dotnet || true
          sleep 5

          echo "Checking Jaeger for Native-C++-Process span..."
          for i in {1..10}; do
            # Use the service name filter in the query to be precise
            RESPONSE=$(curl -s "http://localhost:16686/api/traces?service=CaseConversion-Gateway")
            
            if [[ "$RESPONSE" == *"Native-C++-Process"* ]]; then
              echo "SUCCESS: Found the native bridge span!"
              exit 0
            fi
            
            echo "Attempt $i: Span not found in traces. Services present: $(curl -s http://localhost:16686/api/services)"
            sleep 5
          done
          
          echo "ERROR: Trace never arrived. Printing API logs for debugging..."
          # If you redirected dotnet output to a file, cat it here. 
          # Or just rely on the GitHub Action console output above.
          exit 1