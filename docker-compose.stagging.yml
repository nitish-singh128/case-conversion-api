#                                                                    */
#  Description : Staging environment orchestration for the Word Case */
#                Conversion platform. Designed for pre-release       */
#                validation of the C++ Core and .NET API.            */
#                                                                    */
#  Services    : 1. backend  - .NET 8 API (Staging Artifacts)        */
#                2. frontend - React Web App (Staging Artifacts)     */
#                                                                    */
#  Notes       : - Uses 'unless-stopped' policy for maintenance.     */
#                - Maps to non-standard ports (8081/5174).           */
#                - Validates staging-tagged Docker images.           */
#*********************************************************************/

version: "3.9"

services:
  # ======================================================
  # BACKEND: Staging API Gateway (Native + Managed)
  # ======================================================
  backend:
    image: nitishhsinghhh/case-api:staging
    container_name: case-api-staging
    ports:
      # Non-conflicting staging port
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
    # Governance: Policy designed for controlled maintenance cycles
    restart: unless-stopped
    networks:
      - case-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ======================================================
  # FRONTEND: Staging UI Layer
  # ======================================================
  frontend:
    image: nitishhsinghhh/case-ui:staging
    container_name: case-ui-staging
    ports:
      # Non-conflicting staging port
      - "5174:5173"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - case-network

# ======================================================
# NETWORK INFRASTRUCTURE
# ======================================================
networks:
  case-network:
    driver: bridge