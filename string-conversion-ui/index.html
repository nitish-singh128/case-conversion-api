<!DOCTYPE html>
<html>
<head>
  <title>String Converter</title>
</head>

<body>
  <h2>String Conversion UI</h2>

  <input id="inputText" type="text"/>

  <select id="choice">
    <option value="1">Alternating Case</option>
    <option value="2">Capitalize Words</option>
    <option value="3">Lower Case</option>
    <option value="4">Upper Case</option>
    <option value="5">Sentence Case</option>
    <option value="6">Title Case</option>
    <option value="7">Toggle Case</option>
    <option value="8">Remove Vowels</option>
    <option value="9">Remove Consonants</option>
    <option value="10">Reverse String</option>
    <option value="11">Remove Spaces</option>
    <option value="12">Add Spaces</option>
    <option value="13">Duplicate Characters</option>
    <option value="14">Remove Duplicate Characters</option>
  </select>

  <button onclick="onConvertClick()">Convert</button>

  <h3>Output</h3>
  <div id="output"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
